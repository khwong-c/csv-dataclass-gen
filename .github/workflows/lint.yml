name: Linting

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install uv and set the Python version
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.13"
    - name: Install the project
      run: uv sync --locked --all-extras --dev
    - name: Lint with Ruff
      run: |
        uv run ruff check
